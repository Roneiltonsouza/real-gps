<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL GPS - OFICIAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #001eff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: sans-serif; overflow: hidden; background: #000; }

        /* TELA DE LOGIN */
        #telaLogin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-app {
            width: 220px; height: 220px; border-radius: 45px;
            background-image: url('https://i.ibb.co/d0KVj1SJ/Gemini-Generated-Image-dmy11dmy11dmy11d.png'); 
            background-size: cover; background-position: center;
            box-shadow: 0 0 25px var(--neon-green); margin-bottom: 15px;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .titulo-app {
            color: #fff; font-size: 1.8rem; font-weight: 900; letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-green); margin-bottom: 25px;
        }

        .container-login { width: 90%; max-width: 350px; text-align: center; }

        .input-login {
            width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--neon-green);
            background: rgba(255,255,255,0.1); color: #fff; font-size: 1.2rem; text-align: center;
            margin-bottom: 20px; outline: none;
        }

        .btn-entrar {
            width: 80px; height: 80px; background: var(--neon-blue);
            border: 4px solid #fff; border-radius: 50%; cursor: pointer;
            margin: 0 auto; animation: pulse-blue 1.5s infinite;
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: white;
        }

        @keyframes pulse-blue { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* INTERFACE */
        #interfacePrincipal { display: none; opacity: 0; transition: 0.5s; position: relative; height: 100vh; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .header-status {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.85); color: var(--neon-green);
            padding: 10px 30px; border-radius: 30px; border: 2px solid var(--neon-green);
            font-weight: bold; font-size: 0.9rem; white-space: nowrap;
        }

        .container-busca {
            position: absolute; top: 80px; left: 20px; z-index: 100;
            display: flex; align-items: center; width: calc(100% - 100px); max-width: 300px;
        }
        .input-busca {
            width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--neon-blue);
            background: rgba(255,255,255,0.9); font-weight: bold; outline: none;
        }
        .btn-busca { margin-left: -45px; background: none; border: none; font-size: 20px; cursor: pointer; }

        .btn-marcar-local {
            position: absolute; right: 20px; top: 80px; z-index: 100;
            width: 55px; height: 55px; background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 25px; cursor: pointer; border: 3px solid var(--neon-blue);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-marcar-local.ativo { background: var(--neon-green); }

        /* ABA AMIGOS */
        .aba-amigos {
            position: fixed; bottom: -350px; left: 0; width: 100%; height: 400px;
            background: #fff; z-index: 1000; border-top: 5px solid var(--neon-blue);
            transition: 0.4s ease-out; border-radius: 30px 30px 0 0; padding: 20px;
        }
        .aba-amigos.aberta { bottom: 0; }
        .gatilho-aba {
            position: absolute; top: -48px; left: 50%; transform: translateX(-50%);
            background: var(--neon-blue); color: white; padding: 12px 35px;
            border-radius: 20px 20px 0 0; font-weight: bold; cursor: pointer;
        }

        .item-amigo {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: #f0f4f8; margin-bottom: 10px;
            border-radius: 12px; border-left: 6px solid var(--neon-blue);
            cursor: pointer;
        }

        .popup-remover {
            background: #ff4444; color: white; border: none; padding: 8px;
            border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="logo-app"></div>
        <div class="titulo-app">REAL GPS</div>
        <div class="container-login">
            <input type="text" id="idInput" class="input-login" placeholder="DIGITE SEU NOME" maxlength="20">
            <div class="btn-entrar" onclick="fazerLogin()">🚀</div>
        </div>
    </div>

    <div id="interfacePrincipal">
        <div class="header-status" id="statusTopo">REAL GPS: ONLINE</div>
        
        <div class="container-busca">
            <input type="text" id="inputBusca" class="input-busca" placeholder="Pesquisar local...">
            <button class="btn-busca" onclick="pesquisarLocal()">🔍</button>
        </div>

        <div id="btnMarcar" class="btn-marcar-local" onclick="toggleModoMarcacao()">📍</div>

        <div id="map"></div>

        <div id="abaAmigos" class="aba-amigos">
            <div class="gatilho-aba" onclick="toggleAba()">LISTA DE AMIGOS</div>
            <div style="text-align: center;">
                <input type="text" id="idAmigoInput" style="width:80%; padding:12px; border:2px solid var(--neon-blue); border-radius:15px; text-align:center;" placeholder="NOME DO AMIGO" maxlength="20">
                <br>
                <button onclick="adicionarAmigo()" style="background:var(--neon-blue); color:white; border:none; padding:12px 40px; border-radius:15px; margin-top:15px; cursor:pointer; font-weight:bold; width:80%;">SALVAR NO SISTEMA</button>
            </div>
            <div id="listaCorpo" style="margin-top:20px; height:220px; overflow-y:auto;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAÇÕES CONFERIDAS DO SEU PROJETO
        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            storageBucket: "real-gps-ed315.firebasestorage.app",
            messagingSenderId: "1032476157217",
            appId: "1:1032476157217:web:f2dfdbcdf4bcaa7c150a60",
            measurementId: "G-QHG1B7RRXK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const marcadoresAmigos = {};
        let modoMarcacao = false;

        window.fazerLogin = function() {
            const id = document.getElementById('idInput').value.trim();
            if(id.length < 3) return;
            localStorage.setItem('REALGPS_ID', id);
            entrarNoApp(id);
        };

        window.adicionarAmigo = () => {
            const id = document.getElementById('idAmigoInput').value.trim();
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            if(id && !amigos.includes(id)) {
                amigos.push(id);
                localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
                window.renderLista();
                monitorarAmigos();
                document.getElementById('idAmigoInput').value = "";
            }
        };

        window.renderLista = function() {
            const corpo = document.getElementById('listaCorpo');
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            corpo.innerHTML = "";
            amigos.forEach(id => {
                const div = document.createElement('div');
                div.className = "item-amigo";
                div.onclick = () => window.focarAmigo(id);
                div.innerHTML = `
                    <div style="flex-grow:1;"><b>📍 ${id}</b><br><small style="color:var(--neon-blue)">Toque para localizar</small></div>
                    <span onclick="event.stopPropagation(); window.removerAmigo('${id}')" style="color:red; font-weight:bold; padding:10px;">✖</span>
                `;
                corpo.appendChild(div);
            });
        };

        window.removerAmigo = (id) => {
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]").filter(a => a !== id);
            localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
            if(marcadoresAmigos[id]) { map.removeLayer(marcadoresAmigos[id]); delete marcadoresAmigos[id]; }
            window.renderLista();
        };

        window.focarAmigo = async function(id) {
            const snapshot = await get(ref(db, 'usuarios/' + id));
            const dados = snapshot.val();
            if (dados && dados.lat) {
                map.flyTo([dados.lat, dados.lng], 16);
                if (marcadoresAmigos[id]) marcadoresAmigos[id].openPopup();
                if (document.getElementById('abaAmigos').classList.contains('aberta')) window.toggleAba();
            } else { alert("Amigo offline ou não localizado."); }
        };

        window.pesquisarLocal = async function() {
            const q = document.getElementById('inputBusca').value;
            if(!q) return;
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
            const d = await r.json();
            if(d.length) map.flyTo([d[0].lat, d[0].lon], 16);
        };

        window.toggleModoMarcacao = () => { 
            modoMarcacao = !modoMarcacao; 
            document.getElementById('btnMarcar').classList.toggle('ativo'); 
        };

        window.toggleAba = () => document.getElementById('abaAmigos').classList.toggle('aberta');

        function entrarNoApp(id) {
            document.getElementById('telaLogin').style.display = "none"; 
            document.getElementById('interfacePrincipal').style.display = "block";
            setTimeout(() => document.getElementById('interfacePrincipal').style.opacity = "1", 50);
            document.getElementById('statusTopo').innerText = "CONECTADO: " + id;
            window.renderLista();
            iniciarRastreamento(id);
            monitorarAmigos();
        }

        function iniciarRastreamento(meuId) {
            navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude } = p.coords;
                set(ref(db, 'usuarios/' + meuId), { lat: latitude, lng: longitude, visto: Date.now() });
                if (!window.meuMarcador) {
                    window.meuMarcador = L.circleMarker([latitude, longitude], {radius: 12, fillColor: "#00ff88", color: "#fff", weight: 3}).addTo(map).bindPopup("Você");
                    map.setView([latitude, longitude], 15);
                } else {
                    window.meuMarcador.setLatLng([latitude, longitude]);
                }
            }, null, { enableHighAccuracy: true });
        }

        function monitorarAmigos() {
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            amigos.forEach(id => {
                onValue(ref(db, 'usuarios/' + id), (s) => {
                    const d = s.val();
                    if (d && d.lat) {
                        if (marcadoresAmigos[id]) {
                            marcadoresAmigos[id].setLatLng([d.lat, d.lng]);
                        } else {
                            marcadoresAmigos[id] = L.circleMarker([d.lat, d.lng], {radius: 10, fillColor: "#001eff", color: "#fff", weight: 2}).addTo(map).bindPopup("Amigo: "+id);
                        }
                    }
                });
            });
        }

        map.on('click', (e) => { 
            if(modoMarcacao) { 
                const marcadorPonto = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
                const btnRemover = document.createElement('button');
                btnRemover.innerText = "REMOVER PONTO";
                btnRemover.className = "popup-remover";
                btnRemover.onclick = () => map.removeLayer(marcadorPonto);
                marcadorPonto.bindPopup(btnRemover).openPopup();
                window.toggleModoMarcacao(); 
            } 
        });

        window.onload = () => {
            const idSalvo = localStorage.getItem('REALGPS_ID');
            if(idSalvo) entrarNoApp(idSalvo);
        };
    </script>
</body>
</html>
