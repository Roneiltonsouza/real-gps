<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL GPS - VIDEO CALL 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #001eff; --neon-red: #ff0044; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }

        /* TELA DE CHAMADA RECEBIDA */
        #avisoChamada {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .caller-icon { width: 100px; height: 100px; background: var(--neon-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 30, 255, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 30, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 30, 255, 0); } }

        /* QUADRO DE VIDEO */
        #containerCamera {
            position: fixed; top: 80px; right: 15px; width: 140px; z-index: 2000; display: none;
        }
        .video-box {
            width: 140px; height: 190px; border: 3px solid var(--neon-green); border-radius: 15px;
            overflow: hidden; background: #000; box-shadow: 0 0 20px var(--neon-green);
        }
        #videoCamera { width: 100%; height: 100%; object-fit: cover; }
        .controles-call { display: flex; justify-content: space-between; margin-top: 8px; gap: 5px; }
        .btn-call { flex: 1; padding: 10px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }

        /* LOGIN E MAPA */
        #telaLogin { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .input-login { width: 80%; max-width: 280px; padding: 15px; border-radius: 25px; border: 2px solid var(--neon-green); background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; margin-bottom: 15px; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* ABA AMIGOS */
        .aba-amigos { position: fixed; bottom: -340px; left: 0; width: 100%; height: 380px; background: #111; z-index: 2000; transition: 0.4s ease; border-radius: 30px 30px 0 0; padding: 20px; border-top: 2px solid var(--neon-blue); }
        .aba-amigos.aberta { bottom: 0; }
        .gatilho-aba { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: var(--neon-blue); color: #fff; padding: 12px 35px; border-radius: 20px 20px 0 0; font-weight: bold; }
        .card-amigo { background: #222; margin-bottom: 15px; border-radius: 15px; padding: 15px; border: 1px solid #333; color: white; }
        .btn-ligar { background: var(--neon-green); color: black; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="avisoChamada">
        <div class="caller-icon">📞</div>
        <h2 id="nomeChamando">ALGUÉM LIGANDO...</h2>
        <div style="display: flex; gap: 20px; margin-top: 30px;">
            <button onclick="atenderChamada()" style="background:var(--neon-green); padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold;">ATENDER</button>
            <button onclick="recusarChamada()" style="background:var(--neon-red); padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; color: white;">RECUSAR</button>
        </div>
    </div>

    <div id="containerCamera">
        <div class="video-box">
            <video id="videoCamera" autoplay playsinline></video>
        </div>
        <div class="controles-call">
            <button class="btn-call" style="background:var(--neon-red);" onclick="desligarChamadaGeral()">DESLIGAR</button>
        </div>
    </div>

    <div id="telaLogin">
        <div style="width: 100px; height: 100px; background: var(--neon-green); border-radius: 20px; margin-bottom: 20px;"></div>
        <input type="text" id="idInput" class="input-login" placeholder="SEU NOME">
        <button onclick="tentarLogin()" style="width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--neon-blue); font-size: 30px;">🚀</button>
    </div>

    <div id="interfacePrincipal" style="display:none; width: 100%; height: 100%;">
        <div id="map"></div>
        <div id="abaAmigos" class="aba-amigos">
            <div class="gatilho-aba" onclick="document.getElementById('abaAmigos').classList.toggle('aberta')">AMIGOS</div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="idAmigoInput" style="flex:1; padding:12px; border-radius:12px; border:none; background:#333; color:#fff;" placeholder="NOME DO AMIGO">
                <button onclick="adicionarAmigo()" style="padding:12px; background:var(--neon-green); border:none; border-radius:12px; font-weight:bold;">ADD</button>
            </div>
            <div id="listaCorpo"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            storageBucket: "real-gps-ed315.firebasestorage.app",
            messagingSenderId: "1032476157217",
            appId: "1:1032476157217:web:f2dfdbcdf4bcaa7c150a60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let meuId = "";
        let streamCamera = null;
        let idChamador = "";

        var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        window.tentarLogin = async () => {
            meuId = document.getElementById('idInput').value.trim();
            if(!meuId) return;
            localStorage.setItem('REALGPS_ID', meuId);
            document.getElementById('telaLogin').style.display = "none";
            document.getElementById('interfacePrincipal').style.display = "block";
            map.invalidateSize();
            
            // Monitorar se alguém está me ligando
            onValue(ref(db, `usuarios/${meuId}/chamada`), (snap) => {
                const data = snap.val();
                if (data && data.status === "tocando") {
                    idChamador = data.de;
                    document.getElementById('nomeChamando').innerText = idChamador + " ESTÁ LIGANDO...";
                    document.getElementById('avisoChamada').style.display = "flex";
                } else if (!data) {
                    document.getElementById('avisoChamada').style.display = "none";
                    desligarCameraLocal();
                }
            });

            // Rastreamento
            navigator.geolocation.watchPosition(p => {
                set(ref(db, `usuarios/${meuId}/pos`), { lat: p.coords.latitude, lng: p.coords.longitude });
            });
            monitorarAmigos();
        };

        // LÓGICA DE LIGAÇÃO
        window.ligarPara = (amigoId) => {
            update(ref(db, `usuarios/${amigoId}/chamada`), { status: "tocando", de: meuId });
            abrirCameraLocal();
            alert("Chamando " + amigoId + "...");
        };

        window.atenderChamada = () => {
            update(ref(db, `usuarios/${meuId}/chamada`), { status: "em_call" });
            document.getElementById('avisoChamada').style.display = "none";
            abrirCameraLocal();
        };

        window.recusarChamada = () => {
            remove(ref(db, `usuarios/${meuId}/chamada`));
        };

        window.desligarChamadaGeral = () => {
            remove(ref(db, `usuarios/${meuId}/chamada`));
            if(idChamador) remove(ref(db, `usuarios/${idChamador}/chamada`));
            desligarCameraLocal();
        };

        async function abrirCameraLocal() {
            try {
                streamCamera = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('videoCamera').srcObject = streamCamera;
                document.getElementById('containerCamera').style.display = "block";
            } catch (e) { alert("Erro ao abrir câmera."); }
        }

        function desligarCameraLocal() {
            if(streamCamera) streamCamera.getTracks().forEach(t => t.stop());
            streamCamera = null;
            document.getElementById('containerCamera').style.display = "none";
        }

        window.adicionarAmigo = () => {
            const id = document.getElementById('idAmigoInput').value.trim();
            let lista = JSON.parse(localStorage.getItem('AMIGOS') || "[]");
            if(id && !lista.includes(id)) { lista.push(id); localStorage.setItem('AMIGOS', JSON.stringify(lista)); monitorarAmigos(); }
        };

        function monitorarAmigos() {
            const lista = JSON.parse(localStorage.getItem('AMIGOS') || "[]");
            const corpo = document.getElementById('listaCorpo');
            corpo.innerHTML = "";
            lista.forEach(id => {
                const item = document.createElement('div');
                item.className = "card-amigo";
                item.innerHTML = `👤 ${id} <br><br> <button class="btn-ligar" onclick="ligarPara('${id}')">LIGAR VÍDEO</button>`;
                corpo.appendChild(item);
            });
        }
    </script>
</body>
</html>
