<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL GPS - SEGURANÇA TOTAL 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #001eff; --neon-red: #ff0044; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }

        /* TELA DE LOGIN */
        #telaLogin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-app {
            width: 120px; height: 120px; border-radius: 30px;
            background: url('https://i.ibb.co/d0KVj1SJ/Gemini-Generated-Image-dmy11dmy11dmy11d.png') center/cover;
            box-shadow: 0 0 20px var(--neon-green); border: 2px solid var(--neon-green); margin-bottom: 25px;
        }
        .input-login {
            width: 80%; max-width: 280px; padding: 15px; border-radius: 25px; border: 2px solid var(--neon-green);
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 1.1rem;
        }
        #msgErro { color: var(--neon-red); font-weight: bold; margin: 15px; display: none; text-shadow: 0 0 10px red; text-align: center; width: 85%; }
        .btn-entrar { width: 75px; height: 75px; background: var(--neon-blue); border: 4px solid #fff; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 35px; margin-top: 15px; box-shadow: 0 0 20px var(--neon-blue); }

        /* INTERFACE PRINCIPAL */
        #interfacePrincipal { display: none; width: 100%; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; z-index: 1; background: transparent; }
        
        /* CÂMERA DE FUNDO */
        #cameraFundo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; display: none;
        }

        .btn-configs {
            position: absolute; top: 15px; right: 15px; z-index: 1005;
            background: rgba(0,0,0,0.8); color: white; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: 2px solid var(--neon-blue); cursor: pointer;
        }

        /* MENU CONFIGS & ADMIN */
        #menuConfigs, #painelAdmin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 3000; display: none;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }

        #painelAdmin { z-index: 4000; padding: 20px; }
        .lista-usuarios { width: 100%; max-width: 300px; height: 300px; overflow-y: auto; margin: 20px 0; background: #111; border-radius: 15px; padding: 10px; }
        .item-admin { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; align-items: center; }

        .btn-menu { width: 250px; padding: 15px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; color: white; }
        .btn-blue { background: var(--neon-blue); }
        .btn-red { background: var(--neon-red); }

        /* ABA AMIGOS */
        .aba-amigos {
            position: fixed; bottom: -340px; left: 0; width: 100%; height: 380px;
            background: #111; z-index: 2000; transition: 0.4s ease; border-radius: 30px 30px 0 0; padding: 20px;
            border-top: 2px solid var(--neon-blue);
        }
        .aba-amigos.aberta { bottom: 0; }
        .gatilho-aba {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            background: var(--neon-blue); color: #fff; padding: 12px 35px; border-radius: 20px 20px 0 0; font-weight: bold;
        }

        .card-amigo { background: #222; margin-bottom: 15px; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .btn-rota-linha { width: 100%; height: 40px; background: var(--neon-blue); margin-top: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }

        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <video id="cameraFundo" autoplay playsinline></video>

    <div id="telaLogin">
        <div class="logo-app"></div>
        <div id="msgErro">⚠️ ACESSO NEGADO</div>
        <input type="text" id="idInput" class="input-login" placeholder="DIGITE SEU NOME">
        <div class="btn-entrar" onclick="tentarLogin()">🚀</div>
    </div>

    <div id="interfacePrincipal">
        <div class="btn-configs" onclick="toggleConfigs()">⚙️</div>

        <div id="menuConfigs">
            <h2>CONFIGURAÇÕES</h2>
            <p style="margin: 15px 0;">ID: <b id="meuIdDisplay" style="color:var(--neon-green)"></b></p>
            <button class="btn-menu btn-blue" onclick="toggleCamera()">📷 ALTERNAR CÂMERA</button>
            <button class="btn-menu btn-blue" onclick="abrirAdmin()">🆔 ID GPS (DEVELOPER)</button>
            <button class="btn-menu btn-red" onclick="excluirContaLocal()">🔥 SAIR E LIBERAR NOME</button>
            <button onclick="toggleConfigs()" style="background:none; border:none; color:white; margin-top:30px; text-decoration:underline;">VOLTAR</button>
        </div>

        <div id="painelAdmin">
            <h2>PAINEL ID GPS</h2>
            <div class="lista-usuarios" id="listaAdmin"></div>
            <button class="btn-menu btn-blue" onclick="fecharAdmin()">SAIR DO PAINEL</button>
        </div>

        <div id="map"></div>

        <div id="abaAmigos" class="aba-amigos">
            <div class="gatilho-aba" onclick="toggleAba()">AMIGOS</div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="idAmigoInput" style="flex:1; padding:12px; border-radius:12px; border:none; background:#333; color:#fff;" placeholder="NOME DO AMIGO">
                <button onclick="adicionarAmigo()" style="padding:12px; background:var(--neon-green); border:none; border-radius:12px; font-weight:bold;">ADD</button>
            </div>
            <div id="listaCorpo" style="height:230px; overflow-y:auto;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            storageBucket: "real-gps-ed315.firebasestorage.app",
            messagingSenderId: "1032476157217",
            appId: "1:1032476157217:web:f2dfdbcdf4bcaa7c150a60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let minhaPos = null;
        let streamCamera = null;
        const marcadoresAmigos = {};

        // --- SISTEMA DE LOGIN E TRAVA ---
        window.tentarLogin = async function() {
            const id = document.getElementById('idInput').value.trim();
            const idLocal = localStorage.getItem('REALGPS_ID');
            const snap = await get(ref(db, 'usuarios/' + id));

            if (snap.exists() && idLocal !== id) {
                document.getElementById('msgErro').style.display = "block";
                return;
            }

            localStorage.setItem('REALGPS_ID', id);
            document.getElementById('meuIdDisplay').innerText = id;
            document.getElementById('telaLogin').style.display = "none";
            document.getElementById('interfacePrincipal').style.display = "block";
            
            setTimeout(() => map.invalidateSize(), 300);
            iniciarRastreamento(id);
            monitorarAmigos();
        };

        // --- SISTEMA DE CÂMERA ---
        window.toggleCamera = async function() {
            const video = document.getElementById('cameraFundo');
            const mapDiv = document.getElementById('map');

            if (!streamCamera) {
                try {
                    streamCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = streamCamera;
                    video.style.display = "block";
                    mapDiv.style.background = "transparent";
                    // Torna o mapa levemente transparente para ver a câmera atrás
                    document.querySelector('.leaflet-tile-container').style.opacity = "0.6";
                } catch (e) { alert("Erro ao acessar câmera."); }
            } else {
                streamCamera.getTracks().forEach(t => t.stop());
                streamCamera = null;
                video.style.display = "none";
                document.querySelector('.leaflet-tile-container').style.opacity = "1";
            }
        };

        // --- SISTEMA ADMIN (EXCLUIR ID DO BANCO) ---
        window.abrirAdmin = function() {
            const pass = prompt("CHAVE MESTRA:");
            if(pass === "netchaveapi") {
                document.getElementById('painelAdmin').style.display = "flex";
                carregarUsuariosAdmin();
            }
        };

        function carregarUsuariosAdmin() {
            const lista = document.getElementById('listaAdmin');
            onValue(ref(db, 'usuarios'), (snap) => {
                lista.innerHTML = "";
                const dados = snap.val();
                if(dados) {
                    Object.keys(dados).forEach(u => {
                        const item = document.createElement('div');
                        item.className = "item-admin";
                        item.innerHTML = `<span>👤 ${u}</span> <button onclick="deletarID('${u}')" style="background:red; color:white; border:none; padding:5px; border-radius:5px;">X</button>`;
                        lista.appendChild(item);
                    });
                }
            });
        }

        window.deletarID = async function(id) {
            if(confirm(`Remover ${id} do banco de dados?`)) {
                await remove(ref(db, 'usuarios/' + id));
            }
        };

        window.fecharAdmin = () => document.getElementById('painelAdmin').style.display = "none";

        window.excluirContaLocal = () => {
            if(confirm("Sair deste dispositivo?")) {
                localStorage.clear();
                window.location.reload();
            }
        };

        // --- RASTREAMENTO ---
        function iniciarRastreamento(meuId) {
            navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude } = p.coords;
                minhaPos = { lat: latitude, lng: longitude };
                set(ref(db, 'usuarios/' + meuId), { lat: latitude, lng: longitude, visto: Date.now() });

                if (!window.meuMarcador) {
                    window.meuMarcador = L.circleMarker([latitude, longitude], {radius: 10, fillColor: "#00ff88", color: "#fff", weight: 2}).addTo(map);
                    map.setView([latitude, longitude], 16);
                } else {
                    window.meuMarcador.setLatLng([latitude, longitude]);
                }
            }, null, { enableHighAccuracy: true });
        }

        window.toggleAba = () => document.getElementById('abaAmigos').classList.toggle('aberta');

        window.adicionarAmigo = () => {
            const id = document.getElementById('idAmigoInput').value.trim();
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            if(id && !amigos.includes(id)) {
                amigos.push(id);
                localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
                monitorarAmigos();
                document.getElementById('idAmigoInput').value = "";
            }
        };

        function monitorarAmigos() {
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            const corpo = document.getElementById('listaCorpo');
            corpo.innerHTML = "";
            amigos.forEach(id => {
                const card = document.createElement('div');
                card.className = "card-amigo";
                card.innerHTML = `<div style="color:white; font-weight:bold; display:flex; justify-content:space-between">👤 ${id} <span onclick="window.removerAmigo('${id}')" style="color:var(--neon-red)">✖</span></div>
                                  <div class="btn-rota-linha" onclick="window.acionarRota('${id}')">ROTA ➔</div>`;
                corpo.appendChild(card);
                onValue(ref(db, 'usuarios/' + id), (s) => {
                    const d = s.val();
                    if (d && d.lat) {
                        if (!marcadoresAmigos[id]) marcadoresAmigos[id] = L.circleMarker([d.lat, d.lng], {radius: 8, fillColor: "#001eff", color: "#fff", weight: 2}).addTo(map);
                        else marcadoresAmigos[id].setLatLng([d.lat, d.lng]);
                    }
                });
            });
        }

        window.removerAmigo = (id) => {
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]").filter(a => a !== id);
            localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
            monitorarAmigos();
        };

        window.toggleConfigs = () => {
            const m = document.getElementById('menuConfigs');
            m.style.display = m.style.display === "flex" ? "none" : "flex";
        };

        window.onload = () => {
            if(localStorage.getItem('REALGPS_ID')) {
                document.getElementById('idInput').value = localStorage.getItem('REALGPS_ID');
                tentarLogin();
            }
        };
    </script>
</body>
</html>
