<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL GPS - OFICIAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #001eff; --neon-red: #ff0044; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: sans-serif; overflow: hidden; background: #000; }

        /* TELA DE LOGIN */
        #telaLogin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-app {
            width: 220px; height: 220px; border-radius: 45px;
            background-image: url('https://i.ibb.co/d0KVj1SJ/Gemini-Generated-Image-dmy11dmy11dmy11d.png'); 
            background-size: cover; background-position: center;
            box-shadow: 0 0 25px var(--neon-green); margin-bottom: 15px;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }
        .titulo-app {
            color: #fff; font-size: 1.8rem; font-weight: 900; letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-green); margin-bottom: 25px;
        }
        .input-login {
            width: 90%; max-width: 320px; padding: 15px; border-radius: 30px; border: 2px solid var(--neon-green);
            background: rgba(255,255,255,0.1); color: #fff; font-size: 1.2rem; text-align: center;
            margin-bottom: 10px; outline: none;
        }
        #msgErro { color: var(--neon-red); font-weight: bold; display: none; margin-bottom: 10px; }
        .btn-entrar {
            width: 80px; height: 80px; background: var(--neon-blue);
            border: 4px solid #fff; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 40px;
        }

        /* INTERFACE PRINCIPAL */
        #interfacePrincipal { display: none; position: relative; height: 100vh; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .header-status {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.85); color: var(--neon-green);
            padding: 10px 30px; border-radius: 30px; border: 2px solid var(--neon-green);
            font-weight: bold; font-size: 0.8rem;
        }

        /* CUSTOMIZAÇÃO DA ROTA */
        .leaflet-routing-container {
            background: rgba(0, 0, 0, 0.9) !important;
            color: white !important;
            border: 2px solid var(--neon-blue) !important;
            border-radius: 15px !important;
            max-height: 150px !important;
            overflow-y: auto !important;
            font-size: 12px !important;
        }

        .btn-limpar-rota {
            position: absolute; top: 80px; left: 20px; z-index: 1000;
            background: var(--neon-red); color: white; border: none;
            padding: 10px 15px; border-radius: 20px; font-weight: bold;
            display: none; cursor: pointer; box-shadow: 0 0 10px var(--neon-red);
        }

        /* ENGRENAGEM */
        .config-wrapper { position: absolute; top: 15px; right: 15px; z-index: 1000; }
        .btn-config {
            width: 45px; height: 45px; background: #000; border: 2px solid var(--neon-blue);
            border-radius: 12px; color: var(--neon-blue); display: flex; align-items: center;
            justify-content: center; font-size: 24px; cursor: pointer;
        }
        .menu-config {
            display: none; position: absolute; top: 55px; right: 0; 
            background: rgba(0,0,0,0.9); border: 2px solid var(--neon-red);
            padding: 10px; border-radius: 15px; width: 150px;
        }

        /* ABA AMIGOS */
        .aba-amigos {
            position: fixed; bottom: -350px; left: 0; width: 100%; height: 400px;
            background: #fff; z-index: 2000; border-top: 5px solid var(--neon-blue);
            transition: 0.4s; border-radius: 30px 30px 0 0; padding: 20px;
        }
        .aba-amigos.aberta { bottom: 0; }
        .gatilho-aba {
            position: absolute; top: -48px; left: 50%; transform: translateX(-50%);
            background: var(--neon-blue); color: white; padding: 12px 35px;
            border-radius: 20px 20px 0 0; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="logo-app"></div>
        <div class="titulo-app">REAL GPS</div>
        <div id="msgErro">⚠️ Usuário já cadastrado</div>
        <input type="text" id="idInput" class="input-login" placeholder="NOME OU NÚMERO" maxlength="20">
        <div class="btn-entrar" onclick="tentarLogin()">🚀</div>
    </div>

    <div id="interfacePrincipal">
        <div class="header-status" id="statusTopo">REAL GPS: ONLINE</div>
        <button id="btnLimpar" class="btn-limpar-rota" onclick="limparRota()">❌ FECHAR ROTA</button>

        <div class="config-wrapper">
            <div class="btn-config" onclick="toggleMenu()">⚙️</div>
            <div id="menuConfig" class="menu-config">
                <button style="background:none; border:1px solid red; color:red; width:100%; padding:5px;" onclick="excluirConta()">EXCLUIR CONTA</button>
            </div>
        </div>

        <div id="map"></div>

        <div id="abaAmigos" class="aba-amigos">
            <div class="gatilho-aba" onclick="toggleAba()">LISTA DE AMIGOS</div>
            <input type="text" id="idAmigoInput" style="width:100%; padding:12px; border:2px solid var(--neon-blue); border-radius:15px; text-align:center;" placeholder="NOME DO AMIGO">
            <button onclick="adicionarAmigo()" style="background:var(--neon-blue); color:white; border:none; padding:12px; border-radius:15px; margin-top:10px; width:100%; font-weight:bold;">SALVAR AMIGO</button>
            <div id="listaCorpo" style="margin-top:15px; height:220px; overflow-y:auto;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            storageBucket: "real-gps-ed315.firebasestorage.app",
            messagingSenderId: "1032476157217",
            appId: "1:1032476157217:web:f2dfdbcdf4bcaa7c150a60",
            measurementId: "G-QHG1B7RRXK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const marcadoresAmigos = {};
        let controleRota = null;
        let minhaPos = null;

        // LOGIN E CADASTRO ÚNICO
        window.tentarLogin = async function() {
            const id = document.getElementById('idInput').value.trim();
            if(id.length < 3) return;
            const snapshot = await get(ref(db, 'usuarios/' + id));
            if (snapshot.exists() && localStorage.getItem('REALGPS_ID') !== id) {
                document.getElementById('msgErro').style.display = "block"; return;
            }
            localStorage.setItem('REALGPS_ID', id);
            entrarNoApp(id);
        };

        // FUNÇÃO DE ROTA INTERNA
        window.tracarRotaInterna = (latDest, lngDest) => {
            if (!minhaPos) return alert("Aguardando sua localização...");
            
            // Remove rota anterior se existir
            if (controleRota) map.removeControl(controleRota);

            controleRota = L.Routing.control({
                waypoints: [
                    L.latLng(minhaPos.lat, minhaPos.lng),
                    L.latLng(latDest, lngDest)
                ],
                lineOptions: { styles: [{ color: '#001eff', weight: 6, opacity: 0.8 }] },
                createMarker: function() { return null; }, // Não cria novos marcadores de rota
                addWaypoints: false,
                routeWhileDragging: false
            }).addTo(map);

            document.getElementById('btnLimpar').style.display = "block";
            if (document.getElementById('abaAmigos').classList.contains('aberta')) toggleAba();
        };

        window.limparRota = () => {
            if (controleRota) map.removeControl(controleRota);
            document.getElementById('btnLimpar').style.display = "none";
        };

        // FUNÇÕES GERAIS
        window.toggleMenu = () => {
            const m = document.getElementById('menuConfig');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        };

        window.excluirConta = async function() {
            const id = localStorage.getItem('REALGPS_ID');
            if(confirm("Excluir conta?")) {
                await remove(ref(db, 'usuarios/' + id));
                localStorage.clear(); location.reload();
            }
        };

        window.adicionarAmigo = () => {
            const id = document.getElementById('idAmigoInput').value.trim();
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            if(id && !amigos.includes(id)) {
                amigos.push(id);
                localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
                renderLista(); monitorarAmigos();
            }
        };

        function renderLista() {
            const corpo = document.getElementById('listaCorpo');
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            corpo.innerHTML = "";
            amigos.forEach(id => {
                const div = document.createElement('div');
                div.style = "padding:10px; background:#eee; margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between;";
                div.innerHTML = `<b>${id}</b> <span onclick="window.removerAmigo('${id}')" style="color:red;">✖</span>`;
                div.onclick = () => {
                    get(ref(db, 'usuarios/' + id)).then(s => { if(s.val()) map.flyTo([s.val().lat, s.val().lng], 16); });
                };
                corpo.appendChild(div);
            });
        }

        window.removerAmigo = (id) => {
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]").filter(a => a !== id);
            localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
            if(marcadoresAmigos[id]) map.removeLayer(marcadoresAmigos[id]);
            renderLista();
        };

        window.toggleAba = () => document.getElementById('abaAmigos').classList.toggle('aberta');

        function entrarNoApp(id) {
            document.getElementById('telaLogin').style.display = "none"; 
            document.getElementById('interfacePrincipal').style.display = "block";
            document.getElementById('statusTopo').innerText = "CONECTADO: " + id;
            renderLista();
            iniciarRastreamento(id);
            monitorarAmigos();
        }

        function iniciarRastreamento(meuId) {
            navigator.geolocation.watchPosition((p) => {
                minhaPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                set(ref(db, 'usuarios/' + meuId), { lat: minhaPos.lat, lng: minhaPos.lng, visto: Date.now() });
                if (!window.meuMarcador) {
                    window.meuMarcador = L.circleMarker([minhaPos.lat, minhaPos.lng], {radius: 10, fillColor: "#00ff88", color: "#fff", weight: 2}).addTo(map);
                    map.setView([minhaPos.lat, minhaPos.lng], 15);
                } else {
                    window.meuMarcador.setLatLng([minhaPos.lat, minhaPos.lng]);
                }
            }, null, { enableHighAccuracy: true });
        }

        function monitorarAmigos() {
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            amigos.forEach(id => {
                onValue(ref(db, 'usuarios/' + id), (s) => {
                    const d = s.val();
                    if (d && d.lat) {
                        const btnRota = `<button onclick="tracarRotaInterna(${d.lat}, ${d.lng})" style="background:var(--neon-blue); color:white; border:none; padding:8px; width:100%; border-radius:5px; font-weight:bold; margin-top:5px;">📍 TRACAR ROTA</button>`;
                        if (!marcadoresAmigos[id]) {
                            marcadoresAmigos[id] = L.circleMarker([d.lat, d.lng], {radius: 10, fillColor: "#001eff", color: "#fff", weight: 2}).addTo(map).bindPopup(`<b>${id}</b><br>${btnRota}`);
                        } else {
                            marcadoresAmigos[id].setLatLng([d.lat, d.lng]).setPopupContent(`<b>${id}</b><br>${btnRota}`);
                        }
                    }
                });
            });
        }

        window.onload = () => {
            const idSalvo = localStorage.getItem('REALGPS_ID');
            if(idSalvo) entrarNoApp(idSalvo);
        };
    </script>
</body>
</html>
