<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL GPS - SEGURANÇA TOTAL 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #001eff; --neon-red: #ff0044; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }

        #telaLogin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-app {
            width: 120px; height: 120px; border-radius: 30px;
            background: url('https://i.ibb.co/d0KVj1SJ/Gemini-Generated-Image-dmy11dmy11dmy11d.png') center/cover;
            box-shadow: 0 0 20px var(--neon-green); border: 2px solid var(--neon-green); margin-bottom: 25px;
        }
        .input-login {
            width: 80%; max-width: 280px; padding: 15px; border-radius: 25px; border: 2px solid var(--neon-green);
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 1.1rem;
        }
        #msgErro { color: var(--neon-red); font-weight: bold; margin: 15px; display: none; text-shadow: 0 0 10px red; text-align: center; width: 85%; }
        .btn-entrar { width: 75px; height: 75px; background: var(--neon-blue); border: 4px solid #fff; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 35px; margin-top: 15px; box-shadow: 0 0 20px var(--neon-blue); }

        #interfacePrincipal { display: none; width: 100vw; height: 100vh; position: absolute; }
        #map { width: 100%; height: 100%; }

        /* CAMERA PIP */
        #containerCamera { position: fixed; top: 80px; right: 15px; width: 120px; z-index: 2005; display: none; }
        .video-box { width: 120px; height: 160px; border: 2px solid var(--neon-green); border-radius: 12px; overflow: hidden; background: #000; position: relative; }
        #videoRemote { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #videoLocal { position: absolute; bottom: 5px; right: 5px; width: 40px; height: 50px; border: 1px solid #fff; z-index: 2006; object-fit: cover; background: #222; }

        /* NOTIFICAÇÃO DE CHAMADA */
        #notificacaoChamada { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-atender { background: var(--neon-green); color: #000; padding: 20px; border-radius: 50%; border: none; font-size: 30px; margin: 20px; }
        .btn-recusar { background: var(--neon-red); color: #fff; padding: 20px; border-radius: 50%; border: none; font-size: 30px; margin: 20px; }

        .btn-configs {
            position: absolute; top: 15px; right: 15px; z-index: 1005;
            background: rgba(0,0,0,0.8); color: white; width: 45px; height: 45px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: 2px solid var(--neon-blue); cursor: pointer;
        }

        #menuConfigs, #painelAdmin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 3000; display: none;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        
        .lista-admin { width: 90%; max-width: 320px; height: 50%; overflow-y: auto; background: #111; margin: 20px 0; border: 1px solid #333; padding: 10px; }
        .item-usuario { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; align-items: center; }

        .btn-excluir-conta { background: var(--neon-red); color: white; padding: 15px 30px; border: none; border-radius: 15px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 250px;}

        .btn-limpar-rota {
            position: absolute; bottom: 420px; right: 20px;
            z-index: 1001; background: var(--neon-red); color: white; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold; display: none;
        }

        .aba-amigos {
            position: fixed; bottom: -340px; left: 0; width: 100%; height: 380px;
            background: #111; z-index: 2000; transition: 0.4s ease; border-radius: 30px 30px 0 0; padding: 20px;
            border-top: 2px solid var(--neon-blue);
        }
        .aba-amigos.aberta { bottom: 0; }
        .gatilho-aba {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            background: var(--neon-blue); color: #fff; padding: 12px 35px; border-radius: 20px 20px 0 0; font-weight: bold;
        }

        .card-amigo { background: #222; margin-bottom: 15px; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .btn-acoes { display: flex; gap: 5px; margin-top: 10px; }
        .btn-rota-linha { flex: 3; height: 40px; background: var(--neon-blue); border-radius: 10px 0 0 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.85rem; font-weight: bold; cursor: pointer; border: none;}
        .btn-video-amigo { flex: 1; height: 40px; background: var(--neon-green); border-radius: 0 10px 10px 0; color: #000; font-size: 1.2rem; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center;}
    </style>
</head>
<body>

    <div id="notificacaoChamada">
        <h2 id="textoChamada">ALGUÉM LIGANDO...</h2>
        <div style="display:flex;">
            <button class="btn-atender" onclick="atenderLigacao()">📞</button>
            <button class="btn-recusar" onclick="finalizarChamada()">✖</button>
        </div>
    </div>

    <div id="containerCamera">
        <div class="video-box">
            <video id="videoRemote" autoplay playsinline></video>
            <video id="videoLocal" autoplay playsinline muted></video>
        </div>
        <button onclick="finalizarChamada()" style="width:100%; background:var(--neon-red); color:white; border:none; padding:10px; border-radius:8px; margin-top:5px; font-weight:bold;">DESLIGAR</button>
    </div>

    <div id="telaLogin">
        <div class="logo-app"></div>
        <div id="msgErro">⚠️ ACESSO NEGADO: NOME PROTEGIDO</div>
        <input type="text" id="idInput" class="input-login" placeholder="DIGITE SEU NOME PARA TRAVA">
        <div class="btn-entrar" onclick="tentarLogin()">🚀</div>
    </div>

    <div id="interfacePrincipal">
        <div class="btn-configs" onclick="toggleConfigs()">⚙️</div>
        
        <div id="menuConfigs">
            <h2>SISTEMA REAL GPS 2026</h2>
            <p style="margin-top: 20px; color: #888;">ID Atual: <b id="meuIdDisplay" style="color:var(--neon-green)"></b></p>
            <button onclick="abrirAdmin()" style="background:var(--neon-blue); color:white; padding:15px; border-radius:15px; margin-top:20px; border:none; width:250px; font-weight:bold;">🆔 PAINEL DE IDs (ADM)</button>
            <button class="btn-excluir-conta" onclick="excluirConta()">🔥 APAGAR MEU REGISTRO</button>
            <button onclick="toggleConfigs()" style="background:none; border:none; color:white; margin-top:40px; text-decoration:underline;">VOLTAR</button>
        </div>

        <div id="painelAdmin">
            <h2 style="color:var(--neon-blue)">BANCO DE DADOS EM NUVEM</h2>
            <div class="lista-admin" id="listaAdmin"></div>
            <button onclick="document.getElementById('painelAdmin').style.display='none'" style="color:white; background:none; border:none; margin-top:20px;">FECHAR</button>
        </div>

        <button id="btnLimpar" class="btn-limpar-rota" onclick="limparRastreamento()">PARAR RASTREIO</button>
        <div id="map"></div>
        
        <div id="abaAmigos" class="aba-amigos">
            <div class="gatilho-aba" onclick="toggleAba()">RASTREAR AMIGO</div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="idAmigoInput" style="flex:1; padding:12px; border-radius:12px; border:none; background:#333; color:#fff;" placeholder="ID DO AMIGO">
                <button onclick="adicionarAmigo()" style="padding:12px; background:var(--neon-green); color:#000; border:none; border-radius:12px; font-weight:bold;">ADD</button>
            </div>
            <div id="listaCorpo" style="height:230px; overflow-y:auto; padding-bottom:20px;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove, update, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            storageBucket: "real-gps-ed315.firebasestorage.app",
            messagingSenderId: "1032476157217",
            appId: "1:1032476157217:web:f2dfdbcdf4bcaa7c150a60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let meuId = "";
        let minhaPos = null;
        let linhaAzul = null;
        let marcadorAmigoAtivo = null;
        let monitorAmigoRef = null;
        let localStream = null;
        let pc = null;

        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        function falar(texto) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = 'pt-BR';
            window.speechSynthesis.speak(msg);
        }

        window.tentarLogin = async function() {
            const id = document.getElementById('idInput').value.trim();
            if(!id) return;
            const snap = await get(ref(db, 'usuarios/' + id));
            const idLocal = localStorage.getItem('REALGPS_ID');
            if (snap.exists() && idLocal !== id) {
                document.getElementById('msgErro').style.display = "block";
                falar("Acesso negado.");
                return;
            }
            meuId = id;
            localStorage.setItem('REALGPS_ID', id);
            document.getElementById('meuIdDisplay').innerText = id;
            document.getElementById('telaLogin').style.display = "none";
            document.getElementById('interfacePrincipal').style.display = "block";
            map.invalidateSize();
            iniciarMeuGPS(id);
            renderizarListaAmigos();
            monitorarChamadas();
        };

        function iniciarMeuGPS(id) {
            navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude } = p.coords;
                minhaPos = { lat: latitude, lng: longitude };
                set(ref(db, 'usuarios/' + id), { lat: latitude, lng: longitude, visto: Date.now() });
                if (!window.meuMarcador) {
                    window.meuMarcador = L.circleMarker([latitude, longitude], {radius: 12, fillColor: "#00ff88", color: "#fff", weight: 3}).addTo(map);
                    map.setView([latitude, longitude], 17);
                } else {
                    window.meuMarcador.setLatLng([latitude, longitude]);
                }
            }, null, { enableHighAccuracy: true });
        }

        // --- SISTEMA ADMIN ---
        window.abrirAdmin = () => {
            const senha = prompt("SENHA DO SISTEMA:");
            if(senha === "netchaveapi") {
                document.getElementById('painelAdmin').style.display = "flex";
                onValue(ref(db, 'usuarios'), (snap) => {
                    const lista = document.getElementById('listaAdmin');
                    lista.innerHTML = "";
                    const dados = snap.val();
                    if(dados) {
                        Object.keys(dados).forEach(id => {
                            const div = document.createElement('div');
                            div.className = "item-usuario";
                            div.innerHTML = `<span>👤 ${id}</span> <button onclick="deletarID('${id}')" style="color:red; background:none; border:1px solid red; padding:5px; border-radius:5px;">EXCLUIR</button>`;
                            lista.appendChild(div);
                        });
                    }
                });
            } else { alert("Senha incorreta!"); }
        };

        window.deletarID = (idParaDeletar) => {
            if(confirm("Excluir o ID " + idParaDeletar + " permanentemente?")) {
                remove(ref(db, 'usuarios/' + idParaDeletar));
            }
        };

        // --- VÍDEO CHAMADA CORRIGIDA (SINALIZAÇÃO COMPLETA) ---
        async function iniciarMidia() {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('videoLocal').srcObject = localStream;
            document.getElementById('containerCamera').style.display = "block";
        }

        window.ligarParaAmigo = async (idAmigo) => {
            await iniciarMidia();
            pc = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = e => {
                if(e.candidate) push(ref(db, `chamadas/${idAmigo}/ice_de`), e.candidate.toJSON());
            };

            pc.ontrack = e => {
                document.getElementById('videoRemote').srcObject = e.streams[0];
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            const callRef = ref(db, `chamadas/${idAmigo}`);
            await set(callRef, { de: meuId, offer: offer.sdp, status: "tocando" });

            // Escuta a resposta (Answer)
            onValue(callRef, snap => {
                const val = snap.val();
                if(val && val.answer && pc.signalingState !== "stable") {
                    pc.setRemoteDescription(new RTCSessionDescription({type: 'answer', sdp: val.answer}));
                }
            });

            // Escuta ICE do outro
            onChildAdded(ref(db, `chamadas/${idAmigo}/ice_para`), snap => {
                if(snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });

            falar("Chamando " + idAmigo);
        };

        window.atenderLigacao = async () => {
            const data = window.chamadaAtiva;
            await iniciarMidia();
            pc = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = e => {
                if(e.candidate) push(ref(db, `chamadas/${meuId}/ice_para`), e.candidate.toJSON());
            };

            pc.ontrack = e => {
                document.getElementById('videoRemote').srcObject = e.streams[0];
            };

            await pc.setRemoteDescription(new RTCSessionDescription({type: 'offer', sdp: data.offer}));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            update(ref(db, `chamadas/${meuId}`), { answer: answer.sdp, status: "conversa" });
            
            // Escuta ICE do quem ligou
            onChildAdded(ref(db, `chamadas/${meuId}/ice_de`), snap => {
                if(snap.val()) pc.addIceCandidate(new RTCIceCandidate(snap.val()));
            });

            document.getElementById('notificacaoChamada').style.display = "none";
        };

        window.finalizarChamada = () => {
            remove(ref(db, `chamadas/${meuId}`));
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            pc = null;
            document.getElementById('containerCamera').style.display = "none";
            document.getElementById('notificacaoChamada').style.display = "none";
            document.getElementById('videoRemote').srcObject = null;
        };

        function monitorarChamadas() {
            onValue(ref(db, `chamadas/${meuId}`), snap => {
                const data = snap.val();
                if(!data) {
                    if(pc) finalizarChamada(); // Se o outro apagar a chamada, encerra aqui
                    return;
                }
                if(data.status === "tocando") {
                    document.getElementById('textoChamada').innerText = data.de + " LIGANDO...";
                    document.getElementById('notificacaoChamada').style.display = "flex";
                    window.chamadaAtiva = data;
                }
            });
        }

        // --- RASTREIO E LISTA ---
        window.acionarRastreio = (idAmigo) => {
            limparRastreamento();
            monitorAmigoRef = onValue(ref(db, 'usuarios/' + idAmigo), (s) => {
                const d = s.val();
                if (d && d.lat) {
                    if (!marcadorAmigoAtivo) {
                        marcadorAmigoAtivo = L.circleMarker([d.lat, d.lng], {radius: 10, fillColor: "#001eff", color: "#fff", weight: 2}).addTo(map);
                        linhaAzul = L.polyline([[minhaPos.lat, minhaPos.lng], [d.lat, d.lng]], {color: '#001eff', weight: 4, opacity: 0.7, dashArray: '10,10'}).addTo(map);
                    } else {
                        marcadorAmigoAtivo.setLatLng([d.lat, d.lng]);
                        linhaAzul.setLatLngs([[minhaPos.lat, minhaPos.lng], [d.lat, d.lng]]);
                    }
                    map.fitBounds(L.latLngBounds([minhaPos.lat, minhaPos.lng], [d.lat, d.lng]), {padding: [50, 50]});
                }
            });
            document.getElementById('btnLimpar').style.display = "block";
            toggleAba();
        };

        window.limparRastreamento = () => {
            if (monitorAmigoRef) monitorAmigoRef();
            if (marcadorAmigoAtivo) map.removeLayer(marcadorAmigoAtivo);
            if (linhaAzul) map.removeLayer(linhaAzul);
            marcadorAmigoAtivo = null;
            linhaAzul = null;
            document.getElementById('btnLimpar').style.display = "none";
        };

        window.renderizarListaAmigos = () => {
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            const corpo = document.getElementById('listaCorpo');
            corpo.innerHTML = "";
            amigos.forEach(id => {
                const card = document.createElement('div');
                card.className = "card-amigo";
                card.innerHTML = `<div style="color:white; font-weight:bold; display:flex; justify-content:space-between">👤 ID: ${id} <span onclick="window.removerAmigo('${id}')" style="color:var(--neon-red); cursor:pointer">✖</span></div>
                    <div class="btn-acoes">
                        <button class="btn-rota-linha" onclick="window.acionarRastreio('${id}')">RASTREAR AGORA ➔</button>
                        <button class="btn-video-amigo" onclick="window.ligarParaAmigo('${id}')">📹</button>
                    </div>`;
                corpo.appendChild(card);
            });
        };

        window.adicionarAmigo = () => {
            const id = document.getElementById('idAmigoInput').value.trim();
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            if(id && !amigos.includes(id)) {
                amigos.push(id);
                localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
                renderizarListaAmigos();
                document.getElementById('idAmigoInput').value = "";
            }
        };

        window.removerAmigo = (id) => {
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]").filter(a => a !== id);
            localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
            renderizarListaAmigos();
        };

        window.excluirConta = async function() {
            if(confirm("Liberar este nome e apagar dados do servidor?")){
                await remove(ref(db, 'usuarios/' + meuId));
                localStorage.clear();
                window.location.reload();
            }
        };

        window.toggleAba = () => document.getElementById('abaAmigos').classList.toggle('aberta');
        window.toggleConfigs = () => {
            const m = document.getElementById('menuConfigs');
            m.style.display = m.style.display === "flex" ? "none" : "flex";
        };

        window.onload = () => {
            if(localStorage.getItem('REALGPS_ID')) {
                document.getElementById('idInput').value = localStorage.getItem('REALGPS_ID');
                tentarLogin();
            }
        };
    </script>
</body>
</html>
