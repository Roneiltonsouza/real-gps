<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL GPS - OFICIAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #001eff; --neon-red: #ff0044; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: sans-serif; overflow: hidden; background: #000; }

        /* TELA DE LOGIN */
        #telaLogin {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-app {
            width: 200px; height: 200px; border-radius: 45px;
            background-image: url('https://i.ibb.co/d0KVj1SJ/Gemini-Generated-Image-dmy11dmy11dmy11d.png'); 
            background-size: cover; background-position: center;
            box-shadow: 0 0 25px var(--neon-green); margin-bottom: 15px;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .titulo-app {
            color: #fff; font-size: 1.8rem; font-weight: 900; letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-green); margin-bottom: 25px;
        }

        .input-login {
            width: 100%; padding: 15px; border-radius: 30px; border: 2px solid var(--neon-green);
            background: rgba(255,255,255,0.1); color: #fff; font-size: 1.2rem; text-align: center;
            margin-bottom: 10px; outline: none; transition: 0.3s;
        }

        /* MENSAGEM DE ERRO LED */
        #msgErro {
            color: var(--neon-red); font-weight: bold; font-size: 0.9rem;
            margin-bottom: 15px; text-shadow: 0 0 5px var(--neon-red);
            display: none;
        }

        .btn-entrar {
            width: 80px; height: 80px; background: var(--neon-blue);
            border: 4px solid #fff; border-radius: 50%; cursor: pointer;
            margin: 0 auto; animation: pulse-blue 1.5s infinite;
            box-shadow: 0 0 20px var(--neon-blue);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: white;
        }

        @keyframes pulse-blue { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* INTERFACE */
        #interfacePrincipal { display: none; opacity: 0; transition: 0.5s; position: relative; height: 100vh; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .header-status {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(0,0,0,0.85); color: var(--neon-green);
            padding: 10px 20px; border-radius: 30px; border: 2px solid var(--neon-green);
            font-weight: bold; font-size: 0.8rem; white-space: nowrap;
        }

        /* ABA LED SETTINGS */
        .aba-led-settings { position: absolute; top: 15px; right: 15px; z-index: 200; }
        .btn-led {
            width: 45px; height: 45px; background: #000; border: 2px solid var(--neon-blue);
            border-radius: 12px; color: var(--neon-blue); display: flex; align-items: center;
            justify-content: center; font-size: 20px; cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .menu-led {
            display: none; position: absolute; top: 55px; right: 0; 
            background: rgba(0,0,0,0.95); border: 2px solid var(--neon-red);
            padding: 15px; border-radius: 15px; box-shadow: 0 0 20px var(--neon-red);
            width: 180px; text-align: center;
        }

        /* BOTÃO DE MARCAÇÃO FIXO */
        .btn-marcar-local {
            position: absolute; right: 25px; bottom: 100px; z-index: 100;
            width: 70px; height: 70px; background: var(--neon-blue); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; cursor: pointer; border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0, 30, 255, 0.6);
        }
        .btn-marcar-local.ativo { background: var(--neon-green); box-shadow: 0 0 25px var(--neon-green); }

        /* ABA AMIGOS */
        .aba-amigos {
            position: fixed; bottom: -350px; left: 0; width: 100%; height: 400px;
            background: #fff; z-index: 1000; border-top: 5px solid var(--neon-blue);
            transition: 0.4s ease-out; border-radius: 30px 30px 0 0; padding: 20px;
        }
        .aba-amigos.aberta { bottom: 0; }
        .gatilho-aba {
            position: absolute; top: -48px; left: 50%; transform: translateX(-50%);
            background: var(--neon-blue); color: white; padding: 12px 35px;
            border-radius: 20px 20px 0 0; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="telaLogin">
        <div class="logo-app"></div>
        <div class="titulo-app">REAL GPS</div>
        <div class="container-login" style="width: 85%; max-width: 320px; text-align: center;">
            <div id="msgErro">⚠️ Usuário já cadastrado</div>
            <input type="text" id="idInput" class="input-login" placeholder="DIGITE SEU ID/NOME" maxlength="20">
            <p style="color: #666; font-size: 0.7rem; margin-bottom: 15px;">🔒 CHAVE DE SEGURANÇA ATIVA</p>
            <div class="btn-entrar" onclick="verificarERegistrar()">🚀</div>
        </div>
    </div>

    <div id="interfacePrincipal">
        <div class="header-status" id="statusTopo">REAL GPS: ONLINE</div>

        <div class="aba-led-settings">
            <div class="btn-led" onclick="toggleMenuLed()">⚙️</div>
            <div id="menuLed" class="menu-led">
                <button style="background:none; border:1px solid red; color:red; padding:8px; cursor:pointer; width:100%;" onclick="excluirConta()">Excluir Conta</button>
            </div>
        </div>
        
        <div id="btnMarcar" class="btn-marcar-local" onclick="toggleModoMarcacao()">📍</div>
        <div id="map"></div>

        <div id="abaAmigos" class="aba-amigos">
            <div class="gatilho-aba" onclick="toggleAba()">LISTA DE AMIGOS</div>
            <div style="text-align: center;">
                <input type="text" id="idAmigoInput" style="width:80%; padding:12px; border:2px solid var(--neon-blue); border-radius:15px;" placeholder="NOME DO AMIGO">
                <button onclick="adicionarAmigo()" style="background:var(--neon-blue); color:white; padding:12px; border-radius:15px; margin-top:10px; width:80%; border:none;">SALVAR AMIGO</button>
            </div>
            <div id="listaCorpo" style="margin-top:20px; height:200px; overflow-y:auto;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            storageBucket: "real-gps-ed315.firebasestorage.app",
            messagingSenderId: "1032476157217",
            appId: "1:1032476157217:web:f2dfdbcdf4bcaa7c150a60",
            measurementId: "G-QHG1B7RRXK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const marcadoresAmigos = {};
        let modoMarcacao = false;

        // FUNÇÃO DE SEGURANÇA: Bloqueia IDs duplicados
        window.verificarERegistrar = async function() {
            const id = document.getElementById('idInput').value.trim();
            const erroDiv = document.getElementById('msgErro');
            
            if(id.length < 3) return;

            // Verifica se este ID já existe no banco de dados
            const snapshot = await get(ref(db, 'usuarios/' + id));
            
            if (snapshot.exists()) {
                // Se o ID existe, mas não é o que está salvo neste navegador, bloqueia.
                const idLocal = localStorage.getItem('REALGPS_ID');
                if(idLocal !== id) {
                    erroDiv.style.display = 'block';
                    document.getElementById('idInput').style.borderColor = 'var(--neon-red)';
                    return;
                }
            }

            // Se passou no teste, loga e salva no navegador (Lock)
            erroDiv.style.display = 'none';
            localStorage.setItem('REALGPS_ID', id);
            entrarNoApp(id);
        };

        window.toggleMenuLed = () => {
            const menu = document.getElementById('menuLed');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        };

        window.excluirConta = async function() {
            const id = localStorage.getItem('REALGPS_ID');
            if(confirm("Excluir conta permanentemente?")) {
                await remove(ref(db, 'usuarios/' + id));
                localStorage.clear();
                location.reload();
            }
        };

        window.adicionarAmigo = () => {
            const id = document.getElementById('idAmigoInput').value.trim();
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            if(id && !amigos.includes(id)) {
                amigos.push(id);
                localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
                window.renderLista();
                monitorarAmigos();
                document.getElementById('idAmigoInput').value = "";
            }
        };

        window.renderLista = function() {
            const corpo = document.getElementById('listaCorpo');
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            corpo.innerHTML = "";
            amigos.forEach(id => {
                const div = document.createElement('div');
                div.style = "display:flex; justify-content:space-between; padding:10px; background:#f0f0f0; margin-bottom:5px; border-radius:10px;";
                div.innerHTML = `<b>${id}</b> <span onclick="window.removerAmigo('${id}')" style="color:red; cursor:pointer;">✖</span>`;
                div.onclick = () => window.focarAmigo(id);
                corpo.appendChild(div);
            });
        };

        window.removerAmigo = (id) => {
            let amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]").filter(a => a !== id);
            localStorage.setItem('LISTA_AMIGOS', JSON.stringify(amigos));
            if(marcadoresAmigos[id]) map.removeLayer(marcadoresAmigos[id]);
            window.renderLista();
        };

        window.toggleModoMarcacao = () => { 
            modoMarcacao = !modoMarcacao; 
            document.getElementById('btnMarcar').classList.toggle('ativo'); 
        };

        window.toggleAba = () => document.getElementById('abaAmigos').classList.toggle('aberta');

        function entrarNoApp(id) {
            document.getElementById('telaLogin').style.display = "none"; 
            document.getElementById('interfacePrincipal').style.display = "block";
            setTimeout(() => document.getElementById('interfacePrincipal').style.opacity = "1", 50);
            document.getElementById('statusTopo').innerText = "CONECTADO: " + id;
            window.renderLista();
            iniciarRastreamento(id);
            monitorarAmigos();
        }

        function iniciarRastreamento(meuId) {
            navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude } = p.coords;
                set(ref(db, 'usuarios/' + meuId), { lat: latitude, lng: longitude, visto: Date.now() });
                if (!window.meuMarcador) {
                    window.meuMarcador = L.circleMarker([latitude, longitude], {radius: 12, fillColor: "#00ff88", color: "#fff", weight: 3}).addTo(map);
                    map.setView([latitude, longitude], 15);
                } else {
                    window.meuMarcador.setLatLng([latitude, longitude]);
                }
            }, null, { enableHighAccuracy: true });
        }

        function monitorarAmigos() {
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            amigos.forEach(id => {
                onValue(ref(db, 'usuarios/' + id), (s) => {
                    const d = s.val();
                    if (d && d.lat) {
                        if (!marcadoresAmigos[id]) {
                            marcadoresAmigos[id] = L.circleMarker([d.lat, d.lng], {radius: 10, fillColor: "#001eff", color: "#fff", weight: 2}).addTo(map);
                        } else {
                            marcadoresAmigos[id].setLatLng([d.lat, d.lng]);
                        }
                    }
                });
            });
        }

        window.onload = () => {
            const idSalvo = localStorage.getItem('REALGPS_ID');
            if(idSalvo) entrarNoApp(idSalvo);
        };
    </script>
</body>
</html>
