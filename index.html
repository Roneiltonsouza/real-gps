<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL GPS - SEGURANÇA TOTAL 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #001eff; --neon-red: #ff0044; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }

        /* TELA DE LOGIN */
        #telaLogin { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-app { width: 120px; height: 120px; border-radius: 30px; background: url('https://i.ibb.co/d0KVj1SJ/Gemini-Generated-Image-dmy11dmy11dmy11d.png') center/cover; box-shadow: 0 0 20px var(--neon-green); border: 2px solid var(--neon-green); margin-bottom: 25px; }
        .input-login { width: 80%; max-width: 280px; padding: 15px; border-radius: 25px; border: 2px solid var(--neon-green); background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 1.1rem; }
        #msgErro { color: var(--neon-red); font-weight: bold; margin: 15px; display: none; text-shadow: 0 0 10px red; text-align: center; width: 85%; }
        .btn-entrar { width: 75px; height: 75px; background: var(--neon-blue); border: 4px solid #fff; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 35px; margin-top: 15px; box-shadow: 0 0 20px var(--neon-blue); }

        /* INTERFACE PRINCIPAL */
        #interfacePrincipal { display: none; width: 100vw; height: 100vh; position: absolute; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* CAMERA PIP */
        #containerCamera { position: fixed; top: 80px; right: 15px; width: 120px; z-index: 2005; display: none; }
        .video-box { width: 120px; height: 160px; border: 2px solid var(--neon-green); border-radius: 12px; overflow: hidden; background: #000; position: relative; }
        #videoRemote { width: 100%; height: 100%; object-fit: cover; }
        #videoLocal { position: absolute; bottom: 5px; right: 5px; width: 40px; height: 50px; border: 1px solid #fff; z-index: 2006; object-fit: cover; background: #222; }

        /* CHAMADA */
        #notificacaoChamada { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-atender { background: var(--neon-green); color: #000; padding: 20px; border-radius: 50%; border: none; font-size: 30px; margin: 20px; }
        .btn-recusar { background: var(--neon-red); color: #fff; padding: 20px; border-radius: 50%; border: none; font-size: 30px; margin: 20px; }

        /* PAINEL INSTRUÇÃO E ROTA */
        #painelInstrucao { position: absolute; top: 75px; left: 15px; right: 15px; background: rgba(0,0,0,0.95); color: #fff; padding: 15px; border-radius: 15px; border-left: 6px solid var(--neon-blue); z-index: 1001; font-weight: bold; display: none; }
        .btn-limpar-rota { position: absolute; bottom: 420px; right: 20px; z-index: 1001; background: var(--neon-red); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; display: none; }
        
        /* CORREÇÃO: ABA AMIGOS (LISTA AZUL VERSÃO ANTIGA) */
        .aba-amigos { 
            position: fixed; 
            bottom: -345px; 
            left: 0; 
            width: 100%; 
            height: 390px; 
            background: linear-gradient(180deg, #000c3a 0%, #000 100%); 
            z-index: 2000; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border-radius: 30px 30px 0 0; 
            padding: 20px; 
            border-top: 3px solid var(--neon-blue);
            box-shadow: 0 -10px 25px rgba(0, 30, 255, 0.3);
        }
        .aba-amigos.aberta { bottom: 0; }
        .gatilho-aba { 
            position: absolute; 
            top: -45px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--neon-blue); 
            color: #fff; 
            padding: 12px 45px; 
            border-radius: 20px 20px 0 0; 
            font-weight: bold; 
            box-shadow: 0 -5px 15px var(--neon-blue);
            border: 1px solid #555;
            border-bottom: none;
        }

        /* ESTILO DOS CARDS NA LISTA AZUL */
        .card-amigo { 
            background: rgba(255, 255, 255, 0.05); 
            margin-bottom: 12px; 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid rgba(0, 30, 255, 0.4); 
        }
        .btn-rota-linha { width: 75%; height: 45px; background: var(--neon-blue); border-radius: 12px 0 0 12px; color: #fff; font-weight: bold; border: none; cursor: pointer; }
        .btn-ligar-amigo { width: 25%; height: 45px; background: var(--neon-green); border-radius: 0 12px 12px 0; color: #000; font-size: 1.2rem; border: none; cursor: pointer; }

        /* SCROLL AZUL CUSTOMIZADO */
        #listaCorpo::-webkit-scrollbar { width: 6px; }
        #listaCorpo::-webkit-scrollbar-track { background: #000; }
        #listaCorpo::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        .btn-configs { position: absolute; top: 15px; right: 15px; z-index: 1005; background: rgba(0,0,0,0.8); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--neon-blue); font-size: 24px; }
        #menuConfigs, #painelAdmin { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .lista-admin { width: 90%; max-width: 320px; height: 50%; overflow-y: auto; background: #111; margin: 20px 0; border: 1px solid #333; padding: 10px; }
        .item-usuario { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; align-items: center; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

    <div id="notificacaoChamada">
        <h2 id="textoChamada">LIGANDO...</h2>
        <div style="display:flex;">
            <button class="btn-atender" onclick="atenderLigacao()">📞</button>
            <button class="btn-recusar" onclick="finalizarChamada()">✖</button>
        </div>
    </div>

    <div id="containerCamera">
        <div class="video-box">
            <video id="videoRemote" autoplay playsinline></video>
            <video id="videoLocal" autoplay playsinline muted></video>
        </div>
        <button onclick="finalizarChamada()" style="width:100%; background:var(--neon-red); color:white; border:none; padding:10px; border-radius:8px; margin-top:5px; font-weight:bold;">DESLIGAR</button>
    </div>

    <div id="telaLogin">
        <div class="logo-app"></div>
        <div id="msgErro">⚠️ ACESSO NEGADO: NOME PROTEGIDO</div>
        <input type="text" id="idInput" class="input-login" placeholder="DIGITE SEU NOME">
        <div class="btn-entrar" onclick="tentarLogin()">🚀</div>
    </div>

    <div id="interfacePrincipal">
        <div class="btn-configs" onclick="toggleConfigs()">⚙️</div>
        
        <div id="menuConfigs">
            <h2>CONFIGURAÇÕES</h2>
            <p style="margin-top: 20px; color: #888;">Logado como: <b id="meuIdDisplay" style="color:var(--neon-green)"></b></p>
            <button onclick="abrirAdmin()" style="background:var(--neon-blue); color:white; padding:15px; border-radius:10px; margin-top:20px; border:none; width:250px;">🆔 PAINEL ADMIN</button>
            <button onclick="excluirConta()" style="background:var(--neon-red); color:white; padding:15px; border-radius:10px; margin-top:10px; border:none; width:250px;">🔥 APAGAR MEU REGISTRO</button>
            <button onclick="toggleConfigs()" style="margin-top:40px; color:white; background:none; border:none; text-decoration:underline;">VOLTAR</button>
        </div>

        <div id="painelAdmin">
            <h2 style="color:var(--neon-blue)">GERENCIAR BANCO DE DADOS</h2>
            <div class="lista-admin" id="listaAdmin"></div>
            <button onclick="document.getElementById('painelAdmin').style.display='none'" style="color:white; background:none; border:none; margin-top:20px;">FECHAR</button>
        </div>

        <div id="painelInstrucao">Aguardando rota...</div>
        <button id="btnLimpar" class="btn-limpar-rota" onclick="limparRota()">PARAR ROTA</button>
        <div id="map"></div>
        
        <div id="abaAmigos" class="aba-amigos">
            <div class="gatilho-aba" onclick="toggleAba()">AMIGOS</div>
            <div style="display:flex; gap:10px; margin-bottom:15px; margin-top: 10px;">
                <input type="text" id="idAmigoInput" style="flex:1; padding:14px; border-radius:12px; border:1px solid var(--neon-blue); background:#000; color:#fff;" placeholder="NOME DO AMIGO">
                <button onclick="adicionarAmigo()" style="padding:12px 20px; background:var(--neon-green); border:none; border-radius:12px; font-weight:bold; color:#000;">ADD</button>
            </div>
            <div id="listaCorpo" style="height:250px; overflow-y:auto; padding-right: 5px;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            storageBucket: "real-gps-ed315.firebasestorage.app",
            messagingSenderId: "1032476157217",
            appId: "1:1032476157217:web:f2dfdbcdf4bcaa7c150a60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let meuId = "";
        let minhaPos = null;
        let controleRota = null;
        let listaInstrucoes = [];
        let ultimaInstrucaoFalada = "";
        let localStream = null;
        let pc = null;
        const marcadoresAmigos = {};

        function falar(texto) {
            if (!texto || texto === ultimaInstrucaoFalada) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(texto.replace(/[0-9]/g, '').replace(/[\.,-]/g, ' '));
            msg.lang = 'pt-BR';
            window.speechSynthesis.speak(msg);
            ultimaInstrucaoFalada = texto;
            document.getElementById('painelInstrucao').innerText = texto;
            document.getElementById('painelInstrucao').style.display = "block";
        }

        async function getEnderecoAmigo(lat, lng) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const d = await r.json();
                return d.address.road || d.address.suburb || "Local próximo";
            } catch (e) { return "Localização do amigo"; }
        }

        window.gerarRotaPara = async (latDest, lngDest, nomeAmigo) => {
            if (!minhaPos) return;
            if (controleRota) map.removeControl(controleRota);
            const rua = await getEnderecoAmigo(latDest, lngDest);
            falar(`Iniciando rota para ${nomeAmigo}. Ele está em ${rua}.`);
            
            controleRota = L.Routing.control({
                waypoints: [L.latLng(minhaPos.lat, minhaPos.lng), L.latLng(latDest, lngDest)],
                lineOptions: { styles: [{ color: '#001eff', weight: 8, opacity: 0.9 }] },
                createMarker: () => null, 
                addWaypoints: false
            }).on('routesfound', e => { 
                listaInstrucoes = e.routes[0].instructions; 
            }).addTo(map);
            
            document.getElementById('btnLimpar').style.display = "block";
            if(document.getElementById('abaAmigos').classList.contains('aberta')) toggleAba();
        };

        function iniciarRastreamento(id) {
            navigator.geolocation.watchPosition((p) => {
                const { latitude, longitude } = p.coords;
                minhaPos = { lat: latitude, lng: longitude };
                
                if (listaInstrucoes.length > 0 && controleRota && controleRota._router.route) {
                    const rotaCoords = controleRota._router.route[0].coordinates;
                    listaInstrucoes.forEach(inst => {
                        const stepCoord = rotaCoords[inst.index];
                        if (map.distance([latitude, longitude], [stepCoord.lat, stepCoord.lng]) < 40) falar(inst.text);
                    });
                }

                set(ref(db, 'usuarios/' + id), { lat: latitude, lng: longitude, visto: Date.now() });
                if (!window.meuMarcador) {
                    window.meuMarcador = L.circleMarker([latitude, longitude], {radius: 12, fillColor: "#00ff88", color: "#fff", weight: 3}).addTo(map);
                    map.setView([latitude, longitude], 17);
                } else {
                    window.meuMarcador.setLatLng([latitude, longitude]);
                    map.panTo([latitude, longitude]);
                }
            }, null, { enableHighAccuracy: true });
        }

        window.tentarLogin = async function() {
            const id = document.getElementById('idInput').value.trim();
            if(!id) return;

            const snap = await get(ref(db, 'usuarios/' + id));
            const idLocal = localStorage.getItem('REALGPS_ID');

            if (snap.exists() && idLocal !== id) {
                document.getElementById('msgErro').style.display = "block";
                falar("Acesso negado. Nome protegido.");
                return;
            }

            meuId = id;
            localStorage.setItem('REALGPS_ID', id);
            document.getElementById('meuIdDisplay').innerText = id;
            document.getElementById('telaLogin').style.display = "none";
            document.getElementById('interfacePrincipal').style.display = "block";
            
            falar("Acesso confirmado. Real G P S pronto.");
            map.invalidateSize();
            iniciarRastreamento(id);
            monitorarAmigos();
            monitorarChamadas();
        };

        window.abrirAdmin = () => {
            if(prompt("SENHA MESTRE:") === "netchaveapi") {
                document.getElementById('painelAdmin').style.display = "flex";
                onValue(ref(db, 'usuarios'), snap => {
                    const lista = document.getElementById('listaAdmin');
                    lista.innerHTML = "";
                    if(snap.val()) Object.keys(snap.val()).forEach(id => {
                        const div = document.createElement('div');
                        div.className = "item-usuario";
                        div.innerHTML = `<span>${id}</span> <button onclick="deletarID('${id}')" style="color:red; background:none; border:1px solid red; padding:5px; border-radius:5px;">EXCLUIR</button>`;
                        lista.appendChild(div);
                    });
                });
            }
        };

        window.deletarID = (id) => { if(confirm("Excluir "+id+"?")) remove(ref(db, `usuarios/${id}`)); };

        window.acionarRota = (id) => {
            get(ref(db, 'usuarios/' + id)).then(s => { 
                if(s.val()) gerarRotaPara(s.val().lat, s.val().lng, id); 
            });
        };

        window.monitorarAmigos = () => {
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            const corpo = document.getElementById('listaCorpo');
            corpo.innerHTML = "";
            amigos.forEach(id => {
                const card = document.createElement('div');
                card.className = "card-amigo";
                card.innerHTML = `<div style="color:white; font-weight:bold; display:flex; justify-content:space-between; margin-bottom:10px;">👤 ${id} <span onclick="removerAmigo('${id}')" style="color:var(--neon-red); cursor:pointer">✖</span></div>
                                  <div style="display:flex;">
                                    <button class="btn-rota-linha" onclick="acionarRota('${id}')">ROTA ➔</button>
                                    <button class="btn-ligar-amigo" onclick="ligarParaAmigo('${id}')">📞</button>
                                  </div>`;
                corpo.appendChild(card);
                onValue(ref(db, 'usuarios/' + id), (s) => {
                    const d = s.val();
                    if (d && d.lat) {
                        if (!marcadoresAmigos[id]) marcadoresAmigos[id] = L.circleMarker([d.lat, d.lng], {radius: 9, fillColor: "#001eff", color: "#fff", weight: 2}).addTo(map);
                        else marcadoresAmigos[id].setLatLng([d.lat, d.lng]);
                    }
                });
            });
        };

        window.adicionarAmigo = () => {
            const id = document.getElementById('idAmigoInput').value.trim();
            let lista = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            if(id && !lista.includes(id)) { lista.push(id); localStorage.setItem('LISTA_AMIGOS', JSON.stringify(lista)); monitorarAmigos(); }
            document.getElementById('idAmigoInput').value = "";
        };

        window.removerAmigo = (id) => {
            let lista = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]").filter(a => a !== id);
            localStorage.setItem('LISTA_AMIGOS', JSON.stringify(lista));
            if(marcadoresAmigos[id]) map.removeLayer(marcadoresAmigos[id]);
            monitorarAmigos();
        };

        window.limparRota = () => {
            if (controleRota) map.removeControl(controleRota);
            document.getElementById('btnLimpar').style.display = "none";
            document.getElementById('painelInstrucao').style.display = "none";
            listaInstrucoes = [];
            falar("Rota finalizada.");
        };

        // --- WEBRTC ---
        async function iniciarMidia() {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('videoLocal').srcObject = localStream;
            document.getElementById('containerCamera').style.display = "block";
        }

        window.ligarParaAmigo = async (idAmigo) => {
            await iniciarMidia();
            pc = new RTCPeerConnection();
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = e => { if(e.candidate) set(ref(db, `chamadas/${idAmigo}/ice`), e.candidate.toJSON()); };
            pc.ontrack = e => { document.getElementById('videoRemote').srcObject = e.streams[0]; };
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            set(ref(db, `chamadas/${idAmigo}`), { de: meuId, offer: offer.sdp, status: "tocando" });
        };

        window.atenderLigacao = async () => {
            const data = window.chamadaAtiva;
            await iniciarMidia();
            pc = new RTCPeerConnection();
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = e => { if(e.candidate) set(ref(db, `chamadas/${data.de}/ice`), e.candidate.toJSON()); };
            pc.ontrack = e => { document.getElementById('videoRemote').srcObject = e.streams[0]; };
            await pc.setRemoteDescription(new RTCSessionDescription({type: 'offer', sdp: data.offer}));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            update(ref(db, `chamadas/${meuId}`), { answer: answer.sdp, status: "conversa" });
            document.getElementById('notificacaoChamada').style.display = "none";
        };

        window.finalizarChamada = () => {
            remove(ref(db, `chamadas/${meuId}`));
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(pc) pc.close();
            document.getElementById('containerCamera').style.display = "none";
            document.getElementById('notificacaoChamada').style.display = "none";
        };

        function monitorarChamadas() {
            onValue(ref(db, `chamadas/${meuId}`), snap => {
                const data = snap.val();
                if(data && data.status === "tocando") {
                    document.getElementById('textoChamada').innerText = data.de + " LIGANDO...";
                    document.getElementById('notificacaoChamada').style.display = "flex";
                    window.chamadaAtiva = data;
                }
            });
        }

        window.excluirConta = async function() {
            if(confirm("Apagar seu registro?")){
                await remove(ref(db, 'usuarios/' + meuId));
                localStorage.clear();
                window.location.reload();
            }
        };

        window.toggleAba = () => document.getElementById('abaAmigos').classList.toggle('aberta');
        window.toggleConfigs = () => { const m = document.getElementById('menuConfigs'); m.style.display = m.style.display === "flex" ? "none" : "flex"; };
        window.onload = () => { if(localStorage.getItem('REALGPS_ID')) { document.getElementById('idInput').value = localStorage.getItem('REALGPS_ID'); tentarLogin(); } };
    </script>
</body>
</html>
