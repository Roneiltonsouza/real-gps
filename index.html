<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REAL GPS - SEGURANÇA TOTAL 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon-green: #00ff88; --neon-blue: #001eff; --neon-red: #ff0044; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }

        /* TELA DE LOGIN */
        #telaLogin { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-app { width: 120px; height: 120px; border-radius: 30px; background: url('https://i.ibb.co/d0KVj1SJ/Gemini-Generated-Image-dmy11dmy11dmy11d.png') center/cover; box-shadow: 0 0 20px var(--neon-green); border: 2px solid var(--neon-green); margin-bottom: 25px; }
        .input-login { width: 80%; max-width: 280px; padding: 15px; border-radius: 25px; border: 2px solid var(--neon-green); background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 1.1rem; }
        .btn-entrar { width: 75px; height: 75px; background: var(--neon-blue); border: 4px solid #fff; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 35px; margin-top: 15px; box-shadow: 0 0 20px var(--neon-blue); }

        /* INTERFACE */
        #interfacePrincipal { display: none; width: 100vw; height: 100vh; position: absolute; }
        #map { width: 100%; height: 100%; }

        /* NOTIFICAÇÃO DE CHAMADA RECEBIDA */
        #notificacaoChamada {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .btn-atender { background: var(--neon-green); color: #000; padding: 20px; border-radius: 50%; border: none; font-size: 30px; margin: 20px; cursor: pointer; box-shadow: 0 0 20px var(--neon-green); }
        .btn-recusar { background: var(--neon-red); color: #fff; padding: 20px; border-radius: 50%; border: none; font-size: 30px; margin: 20px; cursor: pointer; box-shadow: 0 0 20px var(--neon-red); }

        /* QUADRO DA CAMERA PIP */
        #containerCamera { position: fixed; top: 80px; right: 15px; width: 120px; z-index: 2005; display: none; }
        .video-box { width: 120px; height: 160px; border: 2px solid var(--neon-green); border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 0 15px var(--neon-green); }
        #videoCamera { width: 100%; height: 100%; object-fit: cover; }
        .controles-call { display: flex; gap: 5px; margin-top: 5px; }
        .btn-call-ctrl { flex: 1; padding: 8px; border: none; border-radius: 8px; font-weight: bold; color: #fff; font-size: 10px; cursor: pointer; }

        .btn-configs { position: absolute; top: 15px; right: 15px; z-index: 1005; background: rgba(0,0,0,0.8); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid var(--neon-blue); cursor: pointer; }
        #menuConfigs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        
        #painelAdmin { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; display: none; flex-direction: column; align-items: center; padding: 20px; }
        .lista-admin { width: 100%; max-width: 320px; height: 60%; overflow-y: auto; background: #111; border-radius: 15px; margin: 20px 0; padding: 10px; border: 1px dashed #333; }
        .item-usuario { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #222; align-items: center; color: white; }

        .btn-acao { width: 250px; padding: 15px; border-radius: 15px; border: none; font-weight: bold; margin-top: 15px; cursor: pointer; color: white; }
        .aba-amigos { position: fixed; bottom: -340px; left: 0; width: 100%; height: 380px; background: #111; z-index: 2000; transition: 0.4s ease; border-radius: 30px 30px 0 0; padding: 20px; border-top: 2px solid var(--neon-blue); }
        .aba-amigos.aberta { bottom: 0; }
        .gatilho-aba { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: var(--neon-blue); color: #fff; padding: 12px 35px; border-radius: 20px 20px 0 0; font-weight: bold; }
        .card-amigo { background: #222; margin-bottom: 15px; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .btn-rota-linha { width: 75%; height: 40px; background: var(--neon-blue); margin-top: 10px; border-radius: 10px 0 0 10px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 0.85rem; font-weight: bold; cursor: pointer; border: none; }
        .btn-ligar-amigo { width: 25%; height: 40px; background: var(--neon-green); margin-top: 10px; border-radius: 0 10px 10px 0; display: inline-flex; align-items: center; justify-content: center; color: #000; font-size: 1.2rem; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="notificacaoChamada">
        <h2 id="textoChamada" style="text-align:center;">👤 ALGUÉM LIGANDO...</h2>
        <div style="display:flex;">
            <button class="btn-atender" onclick="atenderLigacao()">📞</button>
            <button class="btn-recusar" onclick="recusarLigacao()">✖</button>
        </div>
    </div>

    <div id="containerCamera">
        <div class="video-box"><video id="videoCamera" autoplay playsinline></video></div>
        <div class="controles-call">
            <button class="btn-call-ctrl" style="background:var(--neon-green); color:#000;" onclick="abrirMinhaCamera()">ON</button>
            <button class="btn-call-ctrl" style="background:var(--neon-red);" onclick="fecharCameraTotal()">OFF</button>
        </div>
    </div>

    <div id="telaLogin">
        <div class="logo-app"></div>
        <div id="msgErro" style="display:none; color:red;">⚠️ NOME PROTEGIDO</div>
        <input type="text" id="idInput" class="input-login" placeholder="DIGITE SEU NOME">
        <div class="btn-entrar" onclick="tentarLogin()">🚀</div>
    </div>

    <div id="interfacePrincipal">
        <div class="btn-configs" onclick="toggleConfigs()">⚙️</div>
        <div id="menuConfigs">
            <h2>CONFIGURAÇÕES</h2>
            <p>Logado como: <b id="meuIdDisplay" style="color:var(--neon-green)"></b></p>
            <button class="btn-acao" style="background:var(--neon-blue);" onclick="abrirAdmin()">🆔 GERENCIAR IDs</button>
            <button class="btn-acao" style="background:var(--neon-red);" onclick="excluirConta()">🔥 LIBERAR NOME</button>
            <button onclick="toggleConfigs()" style="color:white; margin-top:30px;">VOLTAR</button>
        </div>

        <div id="painelAdmin">
            <h2>EXCLUIR IDs</h2>
            <div class="lista-admin" id="listaAdmin"></div>
            <button class="btn-acao" style="background:var(--neon-blue)" onclick="fecharAdmin()">FECHAR</button>
        </div>

        <div id="map"></div>
        
        <div id="abaAmigos" class="aba-amigos">
            <div class="gatilho-aba" onclick="toggleAba()">AMIGOS</div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="idAmigoInput" style="flex:1; padding:12px; border-radius:12px; border:none; background:#333; color:#fff;" placeholder="NOME DO AMIGO">
                <button onclick="adicionarAmigo()" style="padding:12px; background:var(--neon-green); color:#000; border:none; border-radius:12px; font-weight:bold;">ADD</button>
            </div>
            <div id="listaCorpo" style="height:230px; overflow-y:auto;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFO0CMhfRLqgCjoDk1zDD5VmIi9EtOLTY",
            authDomain: "real-gps-ed315.firebaseapp.com",
            databaseURL: "https://real-gps-ed315-default-rtdb.firebaseio.com",
            projectId: "real-gps-ed315",
            storageBucket: "real-gps-ed315.firebasestorage.app",
            messagingSenderId: "1032476157217",
            appId: "1:1032476157217:web:f2dfdbcdf4bcaa7c150a60"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        var map = L.map('map', { zoomControl: false }).setView([-15.79, -47.88], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let meuId = "";
        let streamCamera = null;
        let idQuemLigou = "";

        // --- SISTEMA DE LIGAÇÃO (CHAMADA) ---
        window.ligarParaAmigo = (amigoId) => {
            set(ref(db, `usuarios/${amigoId}/chamada`), { de: meuId, status: "tocando" });
            abrirMinhaCamera();
            alert("Chamando " + amigoId + "...");
        };

        // Escutar se alguém está me ligando
        function ouvirChamadas() {
            onValue(ref(db, `usuarios/${meuId}/chamada`), (snap) => {
                const data = snap.val();
                if (data && data.status === "tocando") {
                    idQuemLigou = data.de;
                    document.getElementById('textoChamada').innerText = `👤 ${idQuemLigou} LIGANDO...`;
                    document.getElementById('notificacaoChamada').style.display = "flex";
                } else if (!data) {
                    document.getElementById('notificacaoChamada').style.display = "none";
                }
            });
        }

        window.atenderLigacao = () => {
            update(ref(db, `usuarios/${meuId}/chamada`), { status: "em_conversa" });
            document.getElementById('notificacaoChamada').style.display = "none";
            abrirMinhaCamera();
        };

        window.recusarLigacao = () => {
            remove(ref(db, `usuarios/${meuId}/chamada`));
            document.getElementById('notificacaoChamada').style.display = "none";
        };

        window.fecharCameraTotal = () => {
            remove(ref(db, `usuarios/${meuId}/chamada`));
            if(streamCamera) { streamCamera.getTracks().forEach(t => t.stop()); streamCamera = null; }
            document.getElementById('containerCamera').style.display = "none";
        };

        window.abrirMinhaCamera = async () => {
            try {
                streamCamera = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('videoCamera').srcObject = streamCamera;
                document.getElementById('containerCamera').style.display = "block";
            } catch (e) { alert("Câmera bloqueada."); }
        };

        // --- LOGIN E MAPA ---
        window.tentarLogin = async () => {
            meuId = document.getElementById('idInput').value.trim();
            if(!meuId) return;
            localStorage.setItem('REALGPS_ID', meuId);
            document.getElementById('meuIdDisplay').innerText = meuId;
            document.getElementById('telaLogin').style.display = "none";
            document.getElementById('interfacePrincipal').style.display = "block";
            map.invalidateSize();
            ouvirChamadas();
            
            navigator.geolocation.watchPosition(p => {
                set(ref(db, `usuarios/${meuId}`), { lat: p.coords.latitude, lng: p.coords.longitude });
                map.setView([p.coords.latitude, p.coords.longitude], 17);
            });
            monitorarAmigos();
        };

        window.monitorarAmigos = () => {
            const amigos = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            const corpo = document.getElementById('listaCorpo');
            corpo.innerHTML = "";
            amigos.forEach(id => {
                const card = document.createElement('div');
                card.className = "card-amigo";
                card.innerHTML = `<div style="color:white; padding:10px;">👤 ${id}</div>
                                  <div style="display:flex;">
                                    <button class="btn-rota-linha" onclick="alert('Iniciando Rota...')">ROTA ➔</button>
                                    <button class="btn-ligar-amigo" onclick="ligarParaAmigo('${id}')">📞</button>
                                  </div>`;
                corpo.appendChild(card);
            });
        };

        window.toggleAba = () => document.getElementById('abaAmigos').classList.toggle('aberta');
        window.toggleConfigs = () => { const m = document.getElementById('menuConfigs'); m.style.display = m.style.display === "flex" ? "none" : "flex"; };
        window.adicionarAmigo = () => {
            const id = document.getElementById('idAmigoInput').value.trim();
            let lista = JSON.parse(localStorage.getItem('LISTA_AMIGOS') || "[]");
            if(id && !lista.includes(id)) { lista.push(id); localStorage.setItem('LISTA_AMIGOS', JSON.stringify(lista)); monitorarAmigos(); }
        };

        window.onload = () => { if(localStorage.getItem('REALGPS_ID')) { document.getElementById('idInput').value = localStorage.getItem('REALGPS_ID'); tentarLogin(); } };
    </script>
</body>
</html>
